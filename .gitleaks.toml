# gitleaks config for Cairn / CSD repos — extends the built-in default ruleset.
# Verified to produce ZERO findings across full history of all repos while still
# catching real private keys, AWS/Slack/GitHub tokens, etc. (see .githooks/README.md).
title = "Cairn / CSD repos — gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Public on-chain data, conformance test vectors, vendored libs, and doc placeholders — NOT secrets"
regexTarget = "secret"
regexes = [
  '''^0x[0-9a-fA-F]{40}$''',        # 20-byte addresses / scriptPubkey hashes (a private key is 32 bytes / 64 hex)
  '''0x<[A-Za-z0-9_]+>''',          # documentation placeholders: 0x<key>, 0x<addr>
  '''0x[.…]{1,3}''',           # 0x... / 0x… placeholder
  '''^(user|USER):(pass|PASS)''',   # README "postgres://user:pass@..." connection-string placeholder
]
paths = [
  '''(^|/)lib/forge-std/''',        # vendored Foundry standard library (ships a public Infura demo key)
  '''(^|/)test/vectors?/''',        # public cryptographic conformance vectors
  '''\.gitleaks\.toml$''',          # this config
]
